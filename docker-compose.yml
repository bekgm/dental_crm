version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: dentalcrm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dentalcrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dentalcrm_secret}
      POSTGRES_DB: ${POSTGRES_DB:-dentalcrm}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dentalcrm}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dentalcrm-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dentalcrm-ui
    restart: unless-stopped
    ports:
      - "${UI_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:${API_PORT:-8000}/api/v1

volumes:
  pg_data:
  upload_data:
